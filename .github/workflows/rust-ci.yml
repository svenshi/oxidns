name: Rust CI

on:
  workflow_dispatch:
  schedule:
    # Nightly deep feature-powerset sweep (UTC). Only the `feature-powerset`
    # job runs on this trigger.
    - cron: "0 18 * * *"
  push:
    branches:
      - main
      - "release/*"
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "tests/**"
      - "benches/**"
      - ".github/workflows/rust-ci.yml"
  pull_request:
    branches:
      - main
      - "release/*"
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "tests/**"
      - "benches/**"
      - ".github/workflows/rust-ci.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint / Fmt
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system packages on Linux
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ipset nftables

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

      - name: Run clippy
        run: cargo +nightly clippy --locked --workspace --all-targets --all-features -- -D warnings

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-shear

      - name: cargo shear
        run: cargo shear

  feature-combos:
    name: Feature combinations
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system packages on Linux
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ipset nftables

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack

      # Compile every public feature on its own (plus the bare
      # no-default-features core). This is what catches "feature X fails to
      # build in isolation" regressions. The three bundles are features too,
      # so minimal/standard/full are covered here.
      - name: Each-feature check
        run: >
          cargo +nightly hack check --each-feature --no-dev-deps --exclude-features hotpath,hotpath-alloc,_tls-base,_tls-client,_tls-server,_http-server,_http-client

      # Strict clippy on the slim bundles, including tests/benches, so the
      # -D warnings gate (unused imports under cfg, etc.) is enforced there
      # too. full / all-features clippy is covered by the `lint` job.
      - name: minimal clippy
        run: cargo +nightly clippy --no-default-features --features minimal --all-targets --locked -- -D warnings

      - name: standard clippy
        run: cargo +nightly clippy --no-default-features --features standard --all-targets --locked -- -D warnings

  test:
    name: Test (${{ matrix.os }}, ${{ matrix.rust }})
    if: github.event_name != 'schedule'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
            run_build: true
          - os: windows-latest
            rust: stable
            run_build: true
          - os: macos-latest
            rust: stable
            run_build: true
          - os: ubuntu-latest
            rust: beta
            run_build: false

    steps:
      - uses: actions/checkout@v7

      - name: Install system packages on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ipset nftables

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked --workspace --all-features --verbose

      - name: Build
        if: matrix.run_build
        run: cargo build --locked --workspace --all-features --verbose

  test-bundles:
    name: Test bundles (minimal / standard)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system packages on Linux
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ipset nftables

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      # Exercises the cfg(not(feature = ...)) negative tests in
      # tests/feature_gating.rs and the feature-gated integration tests.
      - name: Test minimal bundle
        run: cargo test --locked --no-default-features --features minimal --verbose

      - name: Test standard bundle
        run: cargo test --locked --no-default-features --features standard --verbose

  docs:
    name: Documentation
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --workspace --all-features --no-deps

  feature-powerset:
    name: Feature powerset (nightly)
    # Expensive depth-2 sweep — only on the nightly schedule or manual dispatch.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system packages on Linux
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ipset nftables

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack

      # Pairwise combinations of the granular features. Bundles are unions of
      # the granular flags, so they add no signal here and are excluded.
      - name: depth-2 powerset check
        run: >
          cargo +nightly hack check --feature-powerset --depth 2 --no-dev-deps
          --exclude-features minimal,standard,full,hotpath,hotpath-alloc,_tls-base,_tls-client,_tls-server,_http-server,_http-client