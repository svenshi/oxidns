name: Docs CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "release/*"
    paths:
      - "docs/**"
      - ".github/workflows/docs-ci.yml"
  pull_request:
    branches:
      - main
      - "release/*"
    paths:
      - "docs/**"
      - ".github/workflows/docs-ci.yml"

permissions:
  contents: read

jobs:
  docs-site:
    name: Docs Site Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache npm artifacts
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node20-npm-docs-${{ hashFiles('docs/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-npm-docs-

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs site
        working-directory: docs
        run: npm run build
