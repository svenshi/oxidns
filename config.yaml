# OxiDNS default configuration file
#
# See full documentation at:
# https://oxidns.org

log:
  level: info

# Management API (optional)
api:
  http:
    listen: ":9199"
    # auth:
    #   type: basic
    #   username: admin
    #   password: secret
    # Optional static WebUI directory. Relative paths resolve from -d/--working-dir.
    # Debian packages use -d /var/lib/oxidns, so ./webui means /var/lib/oxidns/webui.
    # API routes are served under /api/*.
    webui:
      root: "./webui"

plugins:
  # Forward to upstream DNS servers
  - tag: forward
    type: forward
    args:
      upstreams:
        - addr: "223.5.5.5"

  - tag: main_sequence
    type: sequence
    args:
      - exec: $forward
      - exec: accept

  # UDP server listening on :5335
  - tag: udp_server
    type: udp_server
    args:
      entry: main_sequence
      listen: ":5335"

  # TCP server listening on :5335
  - tag: tcp_server
    type: tcp_server
    args:
      entry: main_sequence
      listen: ":5335"
